<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>Matrix Calculations</title>
	<link rel="icon" href="data:;base64,iVBORw0KGgo=">
	<script src="jszip.min.js"></script>
	<style>
		body {
			margin: 0;
			background: #111;
			font-family: sans-serif;
			color: white;
			display: flex;
		}

		#sidebar {
			width: 320px;
			background: #1a1a1a;
			height: 100vh;
			padding: 20px;
			box-sizing: border-box;
			overflow-y: auto;
			border-right: 2px solid #2a2a2a;
		}

		#file-picker-label {
			display: block;
			background: #252525;
			border: 2px dashed #ff0064;
			padding: 20px;
			text-align: center;
			color: #fff;
			margin-bottom: 20px;
			border-radius: 8px;
			cursor: pointer;
			font-weight: bold;
			transition: 0.2s;
		}

		#file-picker-label:hover {
			background: #ff0064;
			border-color: #fff;
		}

		/* Song Header Panels */
		.song-title-card {
			background: #2a2a2a;
			padding: 12px;
			margin-top: 10px;
			border-radius: 6px;
			cursor: pointer;
			font-weight: bold;
			border-left: 4px solid #ff0064;
			transition: 0.2s;
		}

		.song-title-card:hover {
			background: #3a3a3a;
		}

		.diff-selection-btn {
			background: #333;
			padding: 8px;
			margin: 4px 0 4px 10px;
			border-radius: 4px;
			cursor: pointer;
			font-size: 13px;
			color: #ccc;
			transition: 0.2s;
		}

		.diff-selection-btn:hover {
			background: #00ffff;
			color: #000;
			font-weight: bold;
		}

		.ui-stack {
			position: absolute;
			top: 10px;
			left: 350px;
			display: flex;
			flex-direction: column;
			gap: 8px;
			pointer-events: none;
		}

		.ui-item {
			font-size: 28px;
			font-weight: bold;
		}

		canvas {
			display: block;
			background: #000;
			height: 100vh;
			flex-grow: 1;
		}

		.button-row {
			display: flex;
			gap: 10px;
			margin-bottom: 20px;
		}

		.button-row .button {
			flex: 1;
			background: #252525;
			border: 2px dashed #ff0064;
			padding: 14px 12px;
			text-align: center;
			color: #fff;
			border-radius: 8px;
			cursor: pointer;
			font-weight: bold;
			transition: 0.2s;
			line-height: 1.2;
		}

		.button-row .button:hover {
			background: #ff0064;
			border-color: #fff;
		}

		#note-type-button {
			display: block;
			width: 100%;
			box-sizing: border-box;
			background: #252525;
			border: 2px dashed #ff0064;
			padding: 20px;
			text-align: center;
			color: #fff;
			margin-bottom: 20px;
			border-radius: 8px;
			cursor: pointer;
			font-weight: bold;
			transition: 0.2s;
		}

		#note-type-button:hover {
			background: #ff0064;
			border-color: #fff;
		}
	</style>
</head>

<body>
	<div id="sidebar">
		<div>
			<input type="button" class="button" id="note-type-button" value="circle">
		</div>
		<div class="button-row">
			<input type="button" id="minus" class="button" value="-">
			<input type="button" id="scroll-speed-btn" class="button" value="">
			<input type="button" id="plus+" class="button" value="+">
		</div>
		<label id="file-picker-label" for="file-picker">Import .osz Beatmap Files</label>
		<input type="file" id="file-picker" accept=".osz,.zip" multiple style="display: none;" />
		<h3>Track Collection</h3>
		<div id="song-list"></div>
	</div>
	<div class="ui-stack">
		<div class="ui-item">Score: <span id="scoreVal">0</span></div>
		<div class="ui-item">Combo: <span id="comboVal">0</span></div>
		<div class="ui-item">Highest Combo: <span id="highComboVal">0</span></div>
		<div class="ui-item">Acc: <span id="accVal">100%</span></div>
		<div class="ui-item">Grade: <span id="gradeVal">SS</span></div>
		<div class="ui-item"><span></span></div>
		<div class="ui-item"><span id="320Val">320: 0</span></div>
		<div class="ui-item"><span id="300Val">300: 0</span></div>
		<div class="ui-item"><span id="200Val">200: 0</span></div>
		<div class="ui-item"><span id="100Val">100: 0</span></div>
		<div class="ui-item"><span id="50Val">50: 0</span></div>
		<div class="ui-item"><span id="0Val">0: 0</span></div>
	</div>
	<script src="framework.js"></script>
	<script>
		ManiaEngine.init(800, 600);
		const stageX = 250;
		let scrollSpeed = 10;
		const keyMap = { 'd': 0, 'f': 1, 'j': 2, 'k': 3 };
		const scrollSpeedButton = document.getElementById('scroll-speed-btn');
		const minusScrollSpeedButton = document.getElementById('minus');
		const plusScrollSpeedButton = document.getElementById('plus+');
		const noteTypeButton = document.getElementById('note-type-button');
		if (scrollSpeedButton) {
			scrollSpeedButton.value = scrollSpeed;
		}
		let activeLanes = [false, false, false, false];
		let activeHoldNotes = [null, null, null, null];
		let activeAudio = null;
		let songStartTime = 0;
		let gameIsPlaying = false;
		let trackReadyToPlay = false;
		let accuracy = 100;
		let hitCounts = { max320: 0, k300: 0, g200: 0, m100: 0, n50: 0, miss: 0 };
		let totalHitAmount = hitCounts.max320 + hitCounts.k300 + hitCounts.g200 + hitCounts.m100 + hitCounts.n50 + hitCounts.miss;
		let highCombo = 0;
		let totalNotesInSong = 0;
		LibraryManager.initDB(() => {
			const picker = document.getElementById("file-picker");
			if (picker) {
				picker.addEventListener('change', async (e) => {
					const files = Array.from(e.target.files || []);
					if (files.length === 0) {
						return;
					}
					for (const file of files) {
						await new Promise((resolve) => {
							LibraryManager.processOsz(file, resolve);
						});
					}
					refreshSongMenu();
					picker.value = "";
				});
			}
			refreshSongMenu();
		});
		function refreshSongMenu() {
			const listContainer = document.getElementById("song-list");
			listContainer.innerHTML = "";
			LibraryManager.getAllSongs((songs) => {
				if (songs.length === 0) {
					listContainer.innerHTML = "<p style='color:#666'>No tracks imported yet.</p>";
					return;
				}
				songs.forEach(song => {
					const itemWrapper = document.createElement("div");
					const titleBox = document.createElement("div");
					titleBox.className = "song-title-card";
					titleBox.innerText = song.folderName;
					if (song.imageBlob) {
						const imageUrl = URL.createObjectURL(song.imageBlob);
						titleBox.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), url(${imageUrl})`;
						titleBox.style.backgroundSize = "cover";
						titleBox.style.backgroundPosition = "center";
						titleBox.style.backgroundRepeat = "no-repeat";
						titleBox.style.color = "#fff";
					}
					itemWrapper.appendChild(titleBox);
					const diffBox = document.createElement("div");
					diffBox.style.display = "none";
					const maps = Array.isArray(song.maps) ? song.maps : Object.values(song.maps);
					maps.forEach(map => {
						const btn = document.createElement("div");
						btn.className = "diff-selection-btn";
						btn.innerText = map.filename.replace(".osu", "");
						btn.onclick = (e) => {
							e.stopPropagation();
							loadTrackFromLibrary(song, map);
						};
						diffBox.appendChild(btn);
					});
					itemWrapper.appendChild(diffBox);
					titleBox.onclick = () => {
						if (diffBox.style.display === "none") {
							diffBox.style.display = "block";
						} else {
							diffBox.style.display = "none";
						}
					};
					listContainer.appendChild(itemWrapper);
				});
			});
		}
		function loadTrackFromLibrary(song, selectedMap) {
			if (activeAudio) {
				activeAudio.pause();
				activeAudio.src = "";
			}
			if (selectedMap && selectedMap.content) {
				console.log("parsing map notes for diff: " + selectedMap.filename);
				activeLanes = [false, false, false, false];
				activeHoldNotes = [null, null, null, null];
				ManiaEngine.score = 0;
				ManiaEngine.combo = 0;
				accuracy = 100;
				hitCounts = { max320: 0, k300: 0, g200: 0, m100: 0, n50: 0, miss: 0 };
				totalHitAmount = 0;
				highCombo = 0;
				document.getElementById('scoreVal').innerText = ManiaEngine.score;
				document.getElementById('comboVal').innerText = ManiaEngine.combo;
				document.getElementById('highComboVal').innerText = highCombo;
				document.getElementById('accVal').innerText = accuracy + "%";
				document.getElementById('gradeVal').innerText = "SS";
				document.getElementById('320Val').innerText = "320: 0";
				document.getElementById('300Val').innerText = "300: 0";
				document.getElementById('200Val').innerText = "200: 0";
				document.getElementById('100Val').innerText = "100: 0";
				document.getElementById('50Val').innerText = "50: 0";
				document.getElementById('0Val').innerText = "0: 0";
				ManiaEngine.parseOsu(selectedMap.content);
				totalNotesInSong = ManiaEngine.activeNotes.length;
				if (song.audioBlob) {
					if (activeAudio && activeAudio.src.startsWith("blob:")) {
						URL.revokeObjectURL(activeAudio.src);
					}
					const audioURL = URL.createObjectURL(song.audioBlob);
					activeAudio = new Audio();
					activeAudio.src = audioURL;
					activeAudio.preload = "auto";
					songStartTime = performance.now();
					trackReadyToPlay = true;
					gameIsPlaying = true;
					console.log("Track loaded and waiting for first key press to start playback");
				} else {
					alert("audio file data missing from this package slot");
				}
			} else {
				alert("this difficulty file appears to be eampty or unreadable");
			}
		}
		window.addEventListener('keydown', (e) => {
			const lane = keyMap[e.key.toLowerCase()];
			if (lane !== undefined) {
				if (trackReadyToPlay && activeAudio && activeAudio.paused) {
					activeAudio.currentTime = 0;
					activeAudio.play().catch(err => {
						console.warn('playback start failed:', err);
					});
					trackReadyToPlay = false;
				}
				if (!activeLanes[lane]) {
					activeLanes[lane] = true;
					checkJudgement(lane);
				}
			}
		});
		window.addEventListener('keyup', (e) => {
			const lane = keyMap[e.key.toLowerCase()];
			if (lane !== undefined) {
				activeLanes[lane] = false;
				const heldNote = activeHoldNotes[lane];
				if (heldNote && heldNote.isLong && heldNote.holdActive) {
					heldNote.holdActive = false;
					activeHoldNotes[lane] = null;
				}
			}
		});
		minusScrollSpeedButton.addEventListener('click', function () {
			scrollSpeed--;
			scrollSpeedButton.value = scrollSpeed;
		});
		plusScrollSpeedButton.addEventListener('click', function () {
			scrollSpeed++;
			scrollSpeedButton.value = scrollSpeed;
		});
		noteTypeButton.addEventListener('click', function () {
			if (ManiaEngine.noteType === 'bar') {
				ManiaEngine.noteType = 'circle';
				noteTypeButton.value = 'circle';
			} else if (ManiaEngine.noteType === 'circle') {
				ManiaEngine.noteType = 'bar';
				noteTypeButton.value = 'bar';
			}
		});
		function updateAccuracy() {
			totalHitAmount = Number(hitCounts.max320) + Number(hitCounts.k300) + Number(hitCounts.g200) + Number(hitCounts.m100) + Number(hitCounts.n50) + Number(hitCounts.miss);
			if (totalHitAmount === 0) {
				accuracy = 100;
			} else {
				accuracy = ((300 * Number(hitCounts.max320) + 300 * Number(hitCounts.k300) + 200 * Number(hitCounts.g200) + 100 * Number(hitCounts.m100) + 50 * Number(hitCounts.n50)) / (300 * totalHitAmount)) * 100;
			}
			document.getElementById('accVal').innerText = accuracy.toFixed(2) + "%";
			document.getElementById('comboVal').innerText = ManiaEngine.combo;
			document.getElementById('highComboVal').innerText = highCombo;
		}
		function updateScore() {
			if (totalNotesInSong === 0) return;
			ManiaEngine.score = Math.round((800000 * (accuracy / 100)) + (200000 * (highCombo / totalNotesInSong)));
			document.getElementById('scoreVal').innerText = ManiaEngine.score;
		}
		function recordHit(type) {
			switch (type) {
				case 'max320':
					ManiaEngine.combo++;
					hitCounts.max320++;
					document.getElementById('320Val').innerText = `320: ${hitCounts.max320}`;
					if (ManiaEngine.combo > highCombo) highCombo = ManiaEngine.combo;
					break;
				case 'k300':
					ManiaEngine.combo++;
					hitCounts.k300++;
					document.getElementById('300Val').innerText = `300: ${hitCounts.k300}`;
					if (ManiaEngine.combo > highCombo) highCombo = ManiaEngine.combo;
					break;
				case 'g200':
					ManiaEngine.combo++;
					hitCounts.g200++;
					document.getElementById('200Val').innerText = `200: ${hitCounts.g200}`;
					if (ManiaEngine.combo > highCombo) highCombo = ManiaEngine.combo;
					break;
				case 'm100':
					ManiaEngine.combo++;
					hitCounts.m100++;
					document.getElementById('100Val').innerText = `100: ${hitCounts.m100}`;
					if (ManiaEngine.combo > highCombo) highCombo = ManiaEngine.combo;
					break;
				case 'n50':
					ManiaEngine.combo = 0;
					hitCounts.n50++;
					document.getElementById('50Val').innerText = `50: ${hitCounts.n50}`;
					break;
				case 'miss':
					ManiaEngine.combo = 0;
					hitCounts.miss++;
					document.getElementById('0Val').innerText = `0: ${hitCounts.miss}`;
					break;
			}
			updateAccuracy();
			updateScore();
		}
		function getScoreForAccuracy(distance) {
			if (distance <= 16) {
				recordHit('max320');
				return 320;
			} else if (distance <= 40) {
				recordHit('k300');
				return 300;
			} else if (distance <= 73) {
				recordHit('g200');
				return 200;
			} else if (distance <= 103) {
				recordHit('m100');
				return 100;
			} else if (distance <= 127) {
				recordHit('n50');
				return 50;
			}
			recordHit('miss');
			return 0;
		}
		function checkJudgement(pressedLane) {
			const currentSongTime = activeAudio ? activeAudio.currentTime * 1000 : 0;
			for (let i = 0; i < ManiaEngine.activeNotes.length; i++) {
				let note = ManiaEngine.activeNotes[i];
				if (note.lane === pressedLane && !note.hit) {
					let noteY = ManiaEngine.hitPosition - (note.time - currentSongTime) * (scrollSpeed / 10);
					let absoluteDistance = Math.abs(noteY - ManiaEngine.hitPosition);
					if (absoluteDistance <= 127) {
						getScoreForAccuracy(absoluteDistance);
						note.hit = true;
						if (note.isLong) {
							note.holdActive = true;
							activeHoldNotes[pressedLane] = note;
						}
						break;
					}
				}
			}
		}
		function updateGame() {
			if (accuracy === 100) {
				document.getElementById('gradeVal').innerText = "SS";
			} else if (accuracy < 100 && accuracy >= 95) {
				document.getElementById('gradeVal').innerText = "S";
			} else if (accuracy < 95 && accuracy >= 90) {
				document.getElementById('gradeVal').innerText = "A";
			} else if (accuracy < 90 && accuracy >= 80) {
				document.getElementById('gradeVal').innerText = "B";
			} else if (accuracy < 80 && accuracy >= 70) {
				document.getElementById('gradeVal').innerText = "C";
			} else if (accuracy < 70) {
				document.getElementById('gradeVal').innerText = "D";
			}
			ManiaEngine.drawStage(stageX, 4);
			for (let i = 0; i < 4; i++) {
				if (activeLanes[i]) {
					ManiaEngine.ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
					ManiaEngine.ctx.fillRect(stageX + (i * ManiaEngine.laneWidth), 0, ManiaEngine.laneWidth, ManiaEngine.canvas.height);
				}
			}
			if (gameIsPlaying && activeAudio) {
				let currentSongTime = activeAudio.currentTime * 1000;
				const visibleTop = -100;
				const visibleBottom = ManiaEngine.canvas.height + 100;
				for (let i = ManiaEngine.activeNotes.length - 1; i >= 0; i--) {
					let note = ManiaEngine.activeNotes[i];
					note.y = ManiaEngine.hitPosition - (note.time - currentSongTime) * (scrollSpeed / 10);
					if (!note.hit && note.y - ManiaEngine.hitPosition > 127) {
						getScoreForAccuracy(128);
						note.hit = true;
						if (note.isLong) {
							note.completed = true;
						}
						continue;
					}
					if (note.isLong) {
						const endY = ManiaEngine.hitPosition - (note.endTime - currentSongTime) * (scrollSpeed / 10);
						if (note.hit && note.holdActive) {
							note.y = ManiaEngine.hitPosition;
						}
						const longColor = (note.lane === 1 || note.lane === 2) ? '#00ffff' : '#ffffff';
						if (note.hit && !note.completed) {
							if (ManiaEngine.noteType === 'bar') {
								ManiaEngine.drawLongNote(stageX, note.lane, note.y, endY, longColor);
							} else if (ManiaEngine.noteType === 'circle') {
								ManiaEngine.drawCircleLongNote(stageX, note.lane, note.y, endY, longColor);
							}
							if (note.holdActive) {
								if (currentSongTime >= note.endTime) {
									const completionDistance = Math.abs((note.endTime - currentSongTime));
									const completionScore = getScoreForAccuracy(completionDistance);
									note.holdActive = false;
									note.completed = true;
									activeHoldNotes[note.lane] = null;
									ManiaEngine.score += completionScore;
									document.getElementById('scoreVal').innerText = ManiaEngine.score;
								}
							}
							if (note.y > visibleTop && note.y < visibleBottom) {
								if (ManiaEngine.noteType === 'bar') {
									ManiaEngine.drawNote(stageX, note.lane, note.y, 20, longColor);
								} else if (ManiaEngine.noteType === 'circle') {
									ManiaEngine.drawCircleNote(stageX, note.lane, note.y, longColor);
								}
							}
						} else if (!note.hit && note.y > visibleTop && note.y < visibleBottom) {
							if (ManiaEngine.noteType === 'bar') {
								ManiaEngine.drawLongNote(stageX, note.lane, note.y, endY, longColor);
								ManiaEngine.drawNote(stageX, note.lane, note.y, 20, longColor);
							} else if (ManiaEngine.noteType === 'circle') {
								ManiaEngine.drawCircleLongNote(stageX, note.lane, note.y, endY, longColor);
							}
						}
					} else if (note.y > visibleTop && note.y < visibleBottom && !note.hit) {
						let color = (note.lane === 1 || note.lane === 2) ? '#00ffff' : '#ffffff';
						if (ManiaEngine.noteType === 'bar') {
							ManiaEngine.drawNote(stageX, note.lane, note.y, 20, color);
						} else if (ManiaEngine.noteType === 'circle') {
							ManiaEngine.drawCircleNote(stageX, note.lane, note.y, color);
						}
					}
					if (note.time < currentSongTime - 200 && !note.hit) {
						note.hit = true;
					}
				}
			}
		}
		ManiaEngine.start(updateGame);
	</script>
</body>

</html>
